name: CI — Autotests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff
        run: ruff check src/ tests/ --line-length 120

      - name: Run tests
        run: pytest -q
